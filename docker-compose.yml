version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: kine-track-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - ./docker/db/seed.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./docker/db/data:/docker-entrypoint-initdb.d/data
      - ./docker/db/import.sql:/docker-entrypoint-initdb.d/02_import.sql
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pg_data: